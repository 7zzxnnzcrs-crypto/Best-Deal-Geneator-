<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Best Deal Automobiles — Listing Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #C8102E;
    --dark: #111111;
    --mid: #1e1e1e;
    --card: #242424;
    --border: #333333;
    --text: #f0f0f0;
    --muted: #888;
    --accent: #e8c840;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--dark); color: var(--text); font-family: 'Barlow', sans-serif; min-height: 100vh; }

  header {
    background: var(--mid);
    border-bottom: 3px solid var(--red);
    padding: 16px 28px;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .logo-mark {
    background: var(--red);
    color: white;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 800;
    font-size: 22px;
    padding: 6px 12px;
    letter-spacing: 1px;
  }
  header h1 { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 20px; }
  header span { font-size: 13px; color: var(--muted); }

  .container { max-width: 860px; margin: 0 auto; padding: 28px 20px; }

  .panel {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 22px 24px;
    margin-bottom: 20px;
  }
  .panel-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--red);
    margin-bottom: 14px;
  }

  .vehicle-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(175px, 1fr));
    gap: 10px;
  }
  .vehicle-card {
    background: var(--mid);
    border: 2px solid var(--border);
    border-radius: 4px;
    padding: 12px 14px;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
  }
  .vehicle-card:hover { border-color: var(--red); }
  .vehicle-card.selected { border-color: var(--red); background: #2a1215; }
  .vc-name { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 15px; line-height: 1.2; margin-bottom: 4px; }
  .vc-price { color: var(--accent); font-size: 14px; font-weight: 600; }
  .vc-miles { color: var(--muted); font-size: 12px; margin-top: 2px; }

  .details-panel { display: none; }
  .details-panel.visible { display: block; }

  .details-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 10px;
    margin-bottom: 18px;
  }
  .detail-item label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 4px;
  }
  .detail-item span { font-size: 15px; font-weight: 500; }

  .notes-label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }
  textarea {
    width: 100%;
    background: var(--mid);
    border: 1px solid var(--border);
    border-radius: 3px;
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    font-size: 14px;
    padding: 10px 12px;
    outline: none;
    resize: vertical;
    transition: border-color 0.2s;
  }
  textarea:focus { border-color: var(--red); }

  .generate-btn {
    width: 100%;
    background: var(--red);
    color: white;
    border: none;
    border-radius: 3px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 14px;
    cursor: pointer;
    margin-top: 16px;
    transition: background 0.2s;
  }
  .generate-btn:hover { background: #a50d24; }
  .generate-btn:disabled { background: #444; cursor: not-allowed; }

  .output-panel { display: none; }
  .output-panel.visible { display: block; }
  .output-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
  .copy-btn {
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 7px 16px;
    border-radius: 3px;
    cursor: pointer;
    transition: background 0.2s, color 0.2s;
  }
  .copy-btn:hover { background: var(--accent); color: var(--dark); }
  .listing-output {
    background: var(--mid);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 18px 20px;
    font-size: 15px;
    line-height: 1.75;
    white-space: pre-wrap;
    color: var(--text);
    min-height: 80px;
  }
  .regen-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 7px 16px;
    border-radius: 3px;
    cursor: pointer;
    margin-top: 12px;
    transition: border-color 0.2s, color 0.2s;
  }
  .regen-btn:hover { border-color: var(--text); color: var(--text); }
  .tip { font-size: 12px; color: var(--muted); margin-top: 8px; font-style: italic; }

  .loading { display: flex; align-items: center; gap: 10px; color: var(--muted); font-size: 14px; }
  .dot-spin {
    width: 18px; height: 18px;
    border: 2px solid var(--border);
    border-top-color: var(--red);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    flex-shrink: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<header>
  <div class="logo-mark">BD</div>
  <div>
    <h1>Best Deal Automobiles LLC</h1>
    <span>Facebook Listing Generator · Salisbury, NC</span>
  </div>
</header>

<div class="container">

  <div class="panel" id="pickerPanel">
    <div class="panel-title">Step 1 — Select a Vehicle</div>
    <div class="vehicle-grid" id="vehicleGrid"></div>
  </div>

  <div class="panel details-panel" id="detailsPanel">
    <div class="panel-title">Step 2 — Review &amp; Generate</div>
    <div class="details-grid" id="detailsGrid"></div>
    <label class="notes-label">Anything extra to mention? (optional)</label>
    <textarea id="notes" rows="2" placeholder="e.g. new tires, one owner, runs great, clean title..."></textarea>
    <button class="generate-btn" id="generateBtn" onclick="generateListing()">Generate Listing</button>
  </div>

  <div class="panel output-panel" id="outputPanel">
    <div class="output-header">
      <div class="panel-title" style="margin-bottom:0">Your Listing</div>
      <button class="copy-btn" onclick="copyListing()">Copy</button>
    </div>
    <div class="listing-output" id="listingOutput"></div>
    <button class="regen-btn" onclick="generateListing()">↻ Regenerate with different wording</button>
    <p class="tip">Every generation uses a different hook — Facebook-safe, no spam triggers.</p>
  </div>

</div>

<script>
const INVENTORY = [
  { name:"2020 Nissan Altima 2.5 S", year:2020, make:"Nissan", model:"Altima 2.5 S", price:11700, mileage:121773, color:"White", interior:"Beige", transmission:"CVT", drivetrain:"FWD", bodyType:"Sedan", engine:"2.5L 4-cylinder" },
  { name:"2020 Chevrolet Malibu LT", year:2020, make:"Chevrolet", model:"Malibu LT", price:8700, mileage:164108, color:"White", interior:"", transmission:"CVT", drivetrain:"FWD", bodyType:"Sedan", engine:"1.5L 4-cylinder" },
  { name:"2018 Toyota RAV4 XLE AWD", year:2018, make:"Toyota", model:"RAV4 XLE AWD", price:16700, mileage:130969, color:"Grey", interior:"Black", transmission:"Automatic", drivetrain:"AWD", bodyType:"SUV", engine:"2.5L 4-cylinder" },
  { name:"2017 Honda Odyssey SE", year:2017, make:"Honda", model:"Odyssey SE", price:10900, mileage:195503, color:"Blue", interior:"", transmission:"Automatic", drivetrain:"FWD", bodyType:"Minivan", engine:"3.5L V6" },
  { name:"2015 Acura TLX w/Tech Package", year:2015, make:"Acura", model:"TLX w/Technology Package", price:10900, mileage:167301, color:"White", interior:"", transmission:"CVT", drivetrain:"FWD", bodyType:"Sedan", engine:"2.4L 4-cylinder" },
  { name:"2015 Honda CR-V LX 4WD", year:2015, make:"Honda", model:"CR-V LX 4WD", price:11900, mileage:171305, color:"White", interior:"Black", transmission:"CVT", drivetrain:"AWD", bodyType:"SUV", engine:"2.4L 4-cylinder" },
  { name:"2015 Mazda CX-5 Sport", year:2015, make:"Mazda", model:"CX-5 Sport", price:10700, mileage:160455, color:"Black", interior:"Black", transmission:"Manual", drivetrain:"FWD", bodyType:"SUV", engine:"2.0L 4-cylinder" },
  { name:"2014 Acura MDX", year:2014, make:"Acura", model:"MDX", price:8500, mileage:210762, color:"Burgundy", interior:"", transmission:"Automatic", drivetrain:"FWD", bodyType:"SUV", engine:"3.5L V6" },
  { name:"2013 Honda CR-V EX-L 4WD", year:2013, make:"Honda", model:"CR-V EX-L 4WD", price:8900, mileage:223451, color:"White", interior:"Beige", transmission:"Automatic", drivetrain:"AWD", bodyType:"SUV", engine:"2.4L 4-cylinder" },
  { name:"2011 Honda Accord EX-L V6", year:2011, make:"Honda", model:"Accord EX-L V6", price:6900, mileage:205422, color:"White", interior:"", transmission:"Automatic", drivetrain:"FWD", bodyType:"Sedan", engine:"3.5L V6" },
  { name:"2011 Nissan Pathfinder S 4WD", year:2011, make:"Nissan", model:"Pathfinder S 4WD", price:8700, mileage:157444, color:"Black", interior:"", transmission:"Automatic", drivetrain:"4WD", bodyType:"SUV", engine:"4.0L V6" },
  { name:"2010 Toyota Highlander Base", year:2010, make:"Toyota", model:"Highlander Base", price:null, mileage:null, color:"", interior:"", transmission:"Automatic", drivetrain:"FWD", bodyType:"SUV", engine:"2.7L 4-cylinder" },
];

let selectedVehicle = null;

function fmt(n) { return n ? n.toLocaleString() : "—"; }

const grid = document.getElementById('vehicleGrid');
INVENTORY.forEach((v, i) => {
  const card = document.createElement('div');
  card.className = 'vehicle-card';
  card.innerHTML = `
    <div class="vc-name">${v.name}</div>
    <div class="vc-price">${v.price ? '$' + v.price.toLocaleString() : 'Call for price'}</div>
    <div class="vc-miles">${v.mileage ? fmt(v.mileage) + ' mi' : 'Mileage TBD'}</div>
  `;
  card.onclick = () => selectVehicle(i, card);
  grid.appendChild(card);
});

function selectVehicle(index, cardEl) {
  document.querySelectorAll('.vehicle-card').forEach(c => c.classList.remove('selected'));
  cardEl.classList.add('selected');
  selectedVehicle = INVENTORY[index];

  const dg = document.getElementById('detailsGrid');
  const fields = [
    ['Year', selectedVehicle.year],
    ['Make', selectedVehicle.make],
    ['Model', selectedVehicle.model],
    ['Price', selectedVehicle.price ? '$' + selectedVehicle.price.toLocaleString() : 'Call for price'],
    ['Mileage', selectedVehicle.mileage ? fmt(selectedVehicle.mileage) + ' miles' : 'TBD'],
    ['Color', selectedVehicle.color || '—'],
    ['Interior', selectedVehicle.interior || '—'],
    ['Transmission', selectedVehicle.transmission],
    ['Drive Train', selectedVehicle.drivetrain],
    ['Body Type', selectedVehicle.bodyType],
    ['Engine', selectedVehicle.engine],
  ];
  dg.innerHTML = fields.map(([label, val]) => `
    <div class="detail-item"><label>${label}</label><span>${val}</span></div>
  `).join('');

  document.getElementById('detailsPanel').classList.add('visible');
  document.getElementById('outputPanel').classList.remove('visible');
  document.getElementById('notes').value = '';
  document.getElementById('detailsPanel').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

async function generateListing() {
  if (!selectedVehicle) return;
  const notes = document.getElementById('notes').value.trim();
  const btn = document.getElementById('generateBtn');
  btn.disabled = true;
  btn.textContent = 'Writing...';

  const outputPanel = document.getElementById('outputPanel');
  const listingOutput = document.getElementById('listingOutput');
  outputPanel.classList.add('visible');
  listingOutput.innerHTML = '<div class="loading"><div class="dot-spin"></div> Writing your listing...</div>';
  outputPanel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

  const v = selectedVehicle;
  const vehicleDetails = `Year: ${v.year}\nMake: ${v.make}\nModel: ${v.model}\nPrice: ${v.price ? '$'+v.price.toLocaleString() : 'Call for price'}\nMileage: ${v.mileage ? fmt(v.mileage)+' miles' : 'unknown'}\nColor: ${v.color||'not specified'}\nInterior: ${v.interior||'not specified'}\nTransmission: ${v.transmission}\nDrive Train: ${v.drivetrain}\nBody Type: ${v.bodyType}\nEngine: ${v.engine}\nDealer notes: ${notes||'none'}`;

  const systemPrompt = `You write Facebook Marketplace vehicle listings for Best Deal Automobiles LLC, a small independent used car dealership at 3115 S Main St, Salisbury, NC. Phone: 704-870-8548.

DEALERSHIP IDENTITY:
- Small, local, personal — not a big corporate lot
- Bilingual: hablamos español
- Over 85 satisfied customers
- 4 years serving Salisbury, Kannapolis, Concord, Lexington, and the Charlotte area
- People trust them and refer family and friends

WRITING STYLE:
- Sound like a real person, not a salesperson or a robot
- Warm, honest, direct — like a neighbor talking to a neighbor
- Short sentences. Conversational. No fluff.
- VARY the hook and opening every single time — never the same opener twice
- Speak to what the buyer actually needs, not just specs
- Be honest about high mileage — address it and explain why it's still a smart buy
- Each vehicle type gets its own feel: a minivan sounds different from a sports sedan
- Naturally mention local areas when it fits

FACEBOOK RULES — STRICT:
- No all-caps words
- No excessive punctuation (!!!, ???)
- No spam phrases: must sell, best deal, won't last, priced to sell, hurry, limited time, serious buyers only
- No misleading claims, no price baiting

FORMAT — every time, exactly:
1. [Year] [Make] [Model] — $[Price]
2. Hook: 1-2 sentences speaking to who needs this vehicle
3. Key details: 3-5 short honest lines
4. One sentence on reliability or value
5. This exact closing, word for word:
"Hablamos español. Over 85 happy customers. Four years serving Salisbury and the surrounding area. Come see why people keep sending their family and friends our way.

Call or text 704-870-8548"

Keep total listing under 120 words. Output ONLY the listing — no commentary, no explanation.`;

  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        system: systemPrompt,
        messages: [{ role: "user", content: `Write a listing for:\n\n${vehicleDetails}\n\nUse a fresh, unique hook suited to this specific vehicle type. Make it feel human.` }]
      })
    });
    const data = await response.json();
    listingOutput.textContent = data.content?.[0]?.text || "Something went wrong. Please try again.";
  } catch {
    listingOutput.textContent = "Connection error. Please try again.";
  }

  btn.disabled = false;
  btn.textContent = 'Generate Listing';
}

function copyListing() {
  const text = document.getElementById('listingOutput').textContent;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.querySelector('.copy-btn');
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = 'Copy', 2000);
  });
}
</script>
</body>
</html>
